# ===============================
# APPLICATION
# ===============================
spring.application.name=complaint-service

# ===============================
# SERVER
# ===============================
server.port=8082

# ===============================
# DATABASE
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ComplaintManagement?createDatabaseIfNotExist=true}
spring.datasource.username=root
spring.datasource.password=nayan@911
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FLYWAY
# ===============================
spring.flyway.baseline-on-migrate=true

# ===============================
# JWT
# ===============================
app.jwt.secret=${JWT_SECRET:change-this-development-secret-key-32chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:4300,http://127.0.0.1:4300}

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}

# ===============================
# DEMO DATA
# ===============================
app.demo-data.enabled=${DEMO_DATA_ENABLED:false}

# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Optional
eureka.instance.prefer-ip-address=true