# Database Configuration for Tests (H2 in-memory MySQL mode)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_UPPER=FALSE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# JWT Configuration
app.jwt.secret=yourVeryLongSecretKeyThatIsAtLeast32CharactersLongForHS256
app.jwt.expiration-ms=86400000

app.rate-limit.enabled=false

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO
